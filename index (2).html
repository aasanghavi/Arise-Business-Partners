<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISE Business Partners — Accounting, CFO Advisory &amp; Business Support</title>
<meta name="description" content="ARISE Business Partners helps business owners strengthen financial management, improve systems and make better commercial decisions — with clarity, confidence and control.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E2A4A;
    --navy-deep:#081A30;
    --navy-soft:#1C3E63;
    --sky:#1C8FCD;
    --sky-light:#5EB4E0;
    --charcoal:#20242B;
    --slate:#5A6572;
    --paper:#F5F8FA;
    --paper-2:#EDF2F5;
    --white:#FFFFFF;
    --line:#DEE5EA;
    --line-dark:rgba(255,255,255,0.14);
    --red:#E0303C;
    --shadow: 0 20px 50px -25px rgba(14,42,74,0.35);
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--charcoal);
    background:var(--white);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }
  h1,h2,h3,h4{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    color:var(--navy-deep);
    letter-spacing:-0.01em;
  }
  p{margin:0;}
  a{color:inherit;text-decoration:none;}
  ul{margin:0;padding:0;list-style:none;}
  img{max-width:100%;display:block;}
  section{position:relative;}
  ::selection{background:var(--sky);color:#fff;}
  :focus-visible{outline:2px solid var(--sky);outline-offset:3px;}

  .wrap{
    max-width:1180px;
    margin:0 auto;
    padding:0 clamp(20px,4vw,48px);
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--sky);
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:'';
    width:22px;height:1px;
    background:var(--sky);
    display:inline-block;
  }

  /* ---------- Fancy Typographic Logo Design ---------- */
  .arise-brand-logo {
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    user-select: none;
    text-decoration: none;
  }
  .arise-brand-logo .main-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.65rem;
    font-weight: 700;
    color: var(--navy-deep);
    line-height: 1;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .arise-brand-logo .caret-accent {
    font-family: 'Inter', sans-serif;
    color: var(--sky);
    font-size: 0.85em;
    font-weight: 400;
    vertical-align: 0.22em;
    display: inline-block;
    margin: 0 -1px;
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .arise-brand-logo:hover .caret-accent {
    transform: translateY(-3px);
  }
  .arise-brand-logo .suffix {
    font-family: 'Inter', sans-serif;
    font-size: 0.76rem;
    font-weight: 600;
    color: var(--slate);
    letter-spacing: 0.02em;
    line-height: 1;
    margin-top: 3px;
  }
  .arise-brand-logo .tag-credential {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    color: var(--sky);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    line-height: 1;
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px solid var(--line);
  }

  /* ---------- Header Layout Updates ---------- */
  header{
    position:fixed;
    top:0;left:0;right:0;
    z-index:100;
    background:rgba(255,255,255,0.88);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    transition:background .3s ease;
  }
  .nav-inner{
    max-width:1180px;
    margin:0 auto;
    padding:8px clamp(20px,4vw,48px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
  }
  .logo-group{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:24px;
  }
  .logo{
    display:flex;
    align-items:center;
    flex-shrink:0;
  }
  .partner-logos{
    display:flex;
    align-items:center;
    gap:16px;
    border-left:2px solid var(--line);
    padding-left:20px;
  }
  .partner-logos img{
    height:55px;
    width:auto;
    object-fit:contain;
  }

  nav.primary-nav{display:flex;align-items:center;gap:36px;flex-shrink:0;}
  .nav-links{display:flex;gap:30px;}
  .nav-links a{
    font-size:0.92rem;font-weight:500;color:var(--slate);
    position:relative;padding:4px 0;
  }
  .nav-links a:hover{color:var(--navy-deep);}
  .nav-links a::after{
    content:'';position:absolute;left:0;bottom:0;width:0;height:2px;
    background:var(--sky);transition:width .25s ease;
  }
  .nav-links a:hover::after{width:100%;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:0.9rem;
    padding:12px 22px;border-radius:7px;
    border:1px solid transparent;
    cursor:pointer;transition:transform .2s ease, box-shadow .2s ease, background .2s ease, color .2s ease;
    white-space:nowrap;
  }
  .btn-primary{background:var(--navy-deep);color:#fff;}
  .btn-primary:hover{background:var(--sky);transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(28,143,205,0.6);}
  .btn-ghost{background:transparent;color:var(--navy-deep);border-color:var(--line);}
  .btn-ghost:hover{border-color:var(--navy-deep);}
  .btn-on-dark{background:var(--sky);color:#fff;}
  .btn-on-dark:hover{background:var(--sky-light);transform:translateY(-1px);}
  .btn-ghost-on-dark{background:transparent;color:#fff;border-color:var(--line-dark);}
  .btn-ghost-on-dark:hover{border-color:#fff;}

  .nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;}
  .nav-toggle span{display:block;width:22px;height:2px;background:var(--navy-deep);margin:5px 0;border-radius:2px;}

  /* ---------- Hero ---------- */
  .hero{
    padding:190px 0 100px;
    background:
      radial-gradient(1100px 600px at 82% -10%, rgba(28,143,205,0.14), transparent 60%),
      var(--white);
    overflow:hidden;
    position:relative;
  }
  .hero-grid{
    display:block;
    max-width:820px;
  }
  .hero h1{
    font-size:clamp(2.35rem,4.4vw,3.7rem);
    line-height:1.15;
    margin:20px 0 22px;
    font-weight:600;
  }
  .hero h1 .biz-title {
    display:block;
  }
  .hero h1 .sub-title {
    display:block;
    font-size:0.55em;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--slate);
    margin-top:4px;
    font-weight:500;
  }
  .hero h1 .tag-line {
    display:block;
    font-size:0.75em;
    margin-top:16px;
    font-weight:600;
  }
  .hero h1 em{
    font-style:normal;
    color:var(--sky);
  }
  .hero-lead{
    font-size:1.1rem;
    color:var(--slate);
    max-width:56ch;
    margin-bottom:34px;
  }
  .hero-ctas{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:46px;}
  .hero-stats{
    display:flex;gap:34px;flex-wrap:wrap;
    border-top:1px solid var(--line);
    padding-top:26px;
  }
  .stat b{
    display:block;font-family:'Space Grotesk',sans-serif;
    font-size:1.5rem;color:var(--navy-deep);font-weight:600;
  }
  .stat span{
    font-family:'IBM Plex Mono',monospace;font-size:0.68rem;
    letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);
  }

  /* ---------- Section shared ---------- */
  .section{padding:100px 0;}
  .section-head{max-width:640px;margin-bottom:52px;}
  .section-head h2{font-size:clamp(1.7rem,3vw,2.3rem);margin-top:16px;font-weight:600;line-height:1.18;}
  .section-head p{color:var(--slate);margin-top:16px;font-size:1.02rem;}
  .on-dark{background:var(--navy-deep);color:rgba(255,255,255,0.86);}
  .on-dark h2, .on-dark h3, .on-dark h4{color:#fff;}
  .on-dark .section-head p{color:rgba(255,255,255,0.62);}
  .bg-paper{background:var(--paper);}

  /* Approach */
  .approach-list{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .approach-item{background:#fff;padding:28px 30px;display:flex;gap:16px;align-items:flex-start;}
  .approach-item svg{flex:none;margin-top:3px;}
  .approach-item p{font-size:1rem;color:var(--charcoal);}

  /* Why choose - two column */
  .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
  .why-list li{
    display:flex;gap:14px;align-items:flex-start;
    padding:16px 0;border-bottom:1px solid var(--line);
    font-size:1.02rem;
  }
  .why-list li:first-child{padding-top:0;}
  .why-list svg{flex:none;margin-top:4px;}
  .why-panel{
    background:linear-gradient(160deg,var(--navy-deep),var(--navy-soft));
    border-radius:16px;color:#fff;padding:36px 34px;
    box-shadow:var(--shadow);
  }
  .why-panel h3{font-size:1.3rem;margin-bottom:14px;font-weight:600;}
  .why-panel p{color:rgba(255,255,255,0.72);font-size:0.98rem;margin-bottom:22px;}

  /* Services */
  .services-list{border-top:1px solid var(--line);}
  .service-row{border-bottom:1px solid var(--line);}
  .service-row summary{
    list-style:none;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 4px;gap:24px;
  }
  .service-row summary::-webkit-details-marker{display:none;}
  .service-row-title{display:flex;align-items:center;gap:20px;}
  .service-index{
    font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--sky);
    width:28px;flex:none;font-weight:600;
  }
  .service-row h3{font-size:1.14rem;font-weight:600;}
  .service-plus{
    flex:none;width:30px;height:30px;border-radius:50%;
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    position:relative;transition:transform .3s ease, border-color .3s ease;
  }
  .service-plus::before,.service-plus::after{
    content:'';position:absolute;background:var(--navy-deep);transition:transform .3s ease;
  }
  .service-plus::before{width:11px;height:1.6px;}
  .service-plus::after{width:1.6px;height:11px;}
  details[open] .service-plus{transform:rotate(45deg);border-color:var(--sky);}
  details[open] summary{padding-bottom:6px;}
  .service-body{padding:0 4px 30px 48px;max-width:760px;}
  .service-body p{color:var(--slate);margin-bottom:16px;}
  .tag-row{display:flex;flex-wrap:wrap;gap:10px;}
  .tag{
    font-size:0.84rem;background:var(--paper-2);color:var(--navy-deep);
    padding:7px 13px;border-radius:20px;font-weight:500;
  }

  /* Industries */
  .chip-row{display:flex;flex-wrap:wrap;gap:12px;}
  .chip{
    padding:12px 20px;border:1px solid var(--line);border-radius:10px;
    font-size:0.95rem;font-weight:500;color:var(--navy-deep);
    background:#fff;transition:border-color .2s ease, transform .2s ease;
  }
  .chip:hover{border-color:var(--sky);transform:translateY(-2px);}

  /* New business owners */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
  .checklist li{
    display:flex;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line);
    font-size:0.98rem;align-items:flex-start;
  }
  .checklist li:last-child{border-bottom:none;}
  .checklist svg{flex:none;margin-top:3px;}
  .ledger-card{
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:34px;
  }
  .ledger-card h4{font-size:1.05rem;margin-bottom:18px;}
  .ledger-card-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:0.82rem;color:var(--slate);}
</style>
</head>
<body>

<header>
  <div class="nav-inner">
    <div class="logo-group">
      <div class="logo">
        <a href="#" class="arise-brand-logo">
          <div class="main-title">A<span class="caret-accent">^</span>RISE</div>
          <div class="suffix">Business Partners</div>
          <div class="tag-credential">Chartered Accountants</div>
        </a>
      </div>
      <div class="partner-logos">
        <!-- Partner logos can still occupy this side space perfectly -->
      </div>
    </div>
    
    <nav class="primary-nav">
      <div class="nav-links">
        <a href="#services">Services</a>
        <a href="#why">Why Us</a>
        <a href="#approach">Our Approach</a>
      </div>
      <button class="btn btn-primary">Book Consultation</button>
    </nav>
  </div>
</header>

</body>
</html>
